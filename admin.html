<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Mengambil path URL yang diketik (misal: /admin atau /beranda)
        var path = window.location.pathname;

        // Jika di ujung URL tidak ada tanda slash (/), otomatis tambahkan slash
        if (path.length > 0 && !path.endsWith('/')) {
            window.location.replace("https://akuifera.id" + path + "/");
        }
    </script>
</head>
<body>
    Mengarahkan halaman...
</body>
</html>
